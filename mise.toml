[tools]
node = "24.18.0"
pnpm = "11.15.1"

[tasks.setup]
description = "Install locked dependencies and Chromium/WebKit for Playwright"
run = ["pnpm install --frozen-lockfile", "pnpm exec playwright install chromium webkit"]

[tasks.check]
description = "Run the complete repository validation suite"
run = "pnpm check"
